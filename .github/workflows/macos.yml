name: macOS Build

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  get-matrix:
    uses: ./.github/workflows/_matrix-config.yml

  build-macos-intel:
    name: macos-${{ matrix.c_compiler }}-qt${{ matrix.qt_version }}-intel
    needs: get-matrix
    strategy:
      fail-fast: false
      matrix:
        c_compiler: ${{ fromJson(needs.get-matrix.outputs.compilers_macos) }}
        qt_version: ${{ fromJson(needs.get-matrix.outputs.qt_versions) }}
        include:
          - c_compiler: gcc
            cpp_compiler: g++
          - c_compiler: clang
            cpp_compiler: clang++

    uses: ./.github/workflows/_build-shared.yml
    with:
      os: macos-latest
      c_compiler: ${{ matrix.c_compiler }}
      cpp_compiler: ${{ matrix.cpp_compiler }}
      qt_version: ${{ matrix.qt_version }}
      target_arch: x86_64
      qt_install_script: |
        # Install Rosetta if not already present; exits non-zero when already installed so we swallow the error
        softwareupdate --install-rosetta --agree-to-license || true
        # Run cmake, build and tests under arch -x86_64 so Qt6's cmake config sees the
        # correct host architecture and doesn't reject the ARM64/x86_64 mismatch
        echo "ARCH_PREFIX=arch -x86_64" >> "$GITHUB_ENV"
        python3 -m venv /tmp/aqt-venv
        source /tmp/aqt-venv/bin/activate
        pip install aqtinstall --quiet
        QT_BASE="${QT_VERSION%.*}"
        QT_MAJOR="${QT_VERSION%%.*}"
        # aqt list-qt returns all available versions; no --arch flag at the list stage
        RESOLVED=$(aqt list-qt mac desktop 2>/dev/null | tr ' ' '\n' | grep "^${QT_BASE}\." | sort -t. -k3 -n | tail -1)
        if [[ -z "$RESOLVED" ]]; then
          echo "::error::Could not resolve a Qt version matching $QT_VERSION" >&2
          exit 1
        fi
        QT_INSTALL_DIR="$HOME/Qt"
        aqt install-qt mac desktop "$RESOLVED" clang_64 --outputdir "$QT_INSTALL_DIR"
        QT_DIR="$QT_INSTALL_DIR/$RESOLVED/clang_64"
        echo "$QT_DIR/bin" >> "$GITHUB_PATH"
        echo "QT_ROOT_DIR=$QT_DIR" >> "$GITHUB_ENV"
        echo "Qt${QT_MAJOR}_DIR=$QT_DIR/lib/cmake/Qt${QT_MAJOR}" >> "$GITHUB_ENV"
        echo "QT_PLUGIN_PATH=$QT_DIR/plugins" >> "$GITHUB_ENV"

  build-macos-arm:
    name: macos-${{ matrix.c_compiler }}-qt${{ matrix.qt_version }}-arm
    needs: get-matrix
    strategy:
      fail-fast: false
      matrix:
        c_compiler: ${{ fromJson(needs.get-matrix.outputs.compilers_macos) }}
        qt_version: ${{ fromJson(needs.get-matrix.outputs.qt_versions) }}
        include:
          - c_compiler: gcc
            cpp_compiler: g++
          - c_compiler: clang
            cpp_compiler: clang++
        exclude:
          # Qt5 has no native Apple Silicon (ARM64) support; ARM macOS binaries require Qt6+
          - qt_version: "5.9.*"
          - qt_version: "5.12.*"
          - qt_version: "5.15.*"

    uses: ./.github/workflows/_build-shared.yml
    with:
      os: macos-latest
      c_compiler: ${{ matrix.c_compiler }}
      cpp_compiler: ${{ matrix.cpp_compiler }}
      qt_version: ${{ matrix.qt_version }}
      target_arch: arm64
