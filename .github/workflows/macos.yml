name: macOS Build

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  get-matrix:
    uses: ./.github/workflows/_matrix-config.yml

  build-macos-intel:
    name: macos-${{ matrix.c_compiler }}-qt${{ matrix.qt_version }}-intel
    needs: get-matrix
    strategy:
      fail-fast: false
      matrix:
        c_compiler: ${{ fromJson(needs.get-matrix.outputs.compilers_macos) }}
        qt_version: ${{ fromJson(needs.get-matrix.outputs.qt_versions) }}
        include:
          - c_compiler: gcc
            cpp_compiler: g++
          - c_compiler: clang
            cpp_compiler: clang++

    uses: ./.github/workflows/_build-shared.yml
    with:
      os: macos-latest
      c_compiler: ${{ matrix.c_compiler }}
      cpp_compiler: ${{ matrix.cpp_compiler }}
      qt_version: ${{ matrix.qt_version }}
      target_arch: x86_64
      qt_install_script: |
        # Install Rosetta so that the x86_64 Qt tools (moc, uic) and x86_64 test
        # binaries can run on the ARM64 runner. Exits non-zero when already installed.
        softwareupdate --install-rosetta --agree-to-license || true
        python3 -m venv /tmp/aqt-venv
        source /tmp/aqt-venv/bin/activate
        pip install aqtinstall --quiet
        QT_BASE="${QT_VERSION%.*}"
        QT_MAJOR="${QT_VERSION%%.*}"
        # aqt list-qt returns all available versions; no --arch flag at the list stage
        RESOLVED=$(aqt list-qt mac desktop 2>/dev/null | tr ' ' '\n' | grep "^${QT_BASE}\." | sort -t. -k3 -n | tail -1)
        if [[ -z "$RESOLVED" ]]; then
          echo "::error::Could not resolve a Qt version matching $QT_VERSION" >&2
          exit 1
        fi
        QT_INSTALL_DIR="$HOME/Qt"
        aqt install-qt mac desktop "$RESOLVED" clang_64 --outputdir "$QT_INSTALL_DIR"
        QT_DIR="$QT_INSTALL_DIR/$RESOLVED/clang_64"
        echo "$QT_DIR/bin" >> "$GITHUB_PATH"
        echo "QT_ROOT_DIR=$QT_DIR" >> "$GITHUB_ENV"
        echo "Qt${QT_MAJOR}_DIR=$QT_DIR/lib/cmake/Qt${QT_MAJOR}" >> "$GITHUB_ENV"
        echo "QT_PLUGIN_PATH=$QT_DIR/plugins" >> "$GITHUB_ENV"
        echo "CMAKE_PREFIX_PATH=$QT_DIR" >> "$GITHUB_ENV"
        # cmake runs natively as ARM64; the cross-compilation target is x86_64 via
        # CMAKE_OSX_ARCHITECTURES. Qt6 checks that the host arch matches the installed
        # Qt's arch (clang_64 = x86_64) and rejects the ARM64 host — suppress that check.
        # The compiled output and Qt tools are x86_64 and run automatically via Rosetta.
        echo "CMAKE_ARCH_FLAGS=-DCMAKE_OSX_ARCHITECTURES=x86_64 -DQT_NO_FORCE_ARCHITECTURE_CHECK=TRUE" >> "$GITHUB_ENV"

  build-macos-arm:
    name: macos-${{ matrix.c_compiler }}-qt${{ matrix.qt_version }}-arm
    needs: get-matrix
    strategy:
      fail-fast: false
      matrix:
        c_compiler: ${{ fromJson(needs.get-matrix.outputs.compilers_macos) }}
        qt_version: ${{ fromJson(needs.get-matrix.outputs.qt_versions) }}
        include:
          - c_compiler: gcc
            cpp_compiler: g++
          - c_compiler: clang
            cpp_compiler: clang++
        exclude:
          # Qt5 has no native Apple Silicon (ARM64) support; ARM macOS binaries require Qt6+
          - qt_version: "5.9.*"
          - qt_version: "5.12.*"
          - qt_version: "5.15.*"

    uses: ./.github/workflows/_build-shared.yml
    with:
      os: macos-latest
      c_compiler: ${{ matrix.c_compiler }}
      cpp_compiler: ${{ matrix.cpp_compiler }}
      qt_version: ${{ matrix.qt_version }}
      target_arch: arm64
