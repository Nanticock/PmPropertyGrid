name: Shared Build Logic

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      c_compiler:
        required: true
        type: string
      cpp_compiler:
        required: true
        type: string
      qt_version:
        required: true
        type: string
      qt_arch:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
          # When on an ARM runner targeting x86_64 Qt (clang_64), emit x86_64 output via
          # -DCMAKE_OSX_ARCHITECTURES. cmake/build tools stay as native ARM64 binaries;
          # only the compiled output is x86_64. Rosetta handles running x86_64 test binaries.
          if [[ "${{ runner.os }}" == "macOS" && "${{ runner.arch }}" == "ARM64" && "${{ inputs.qt_arch }}" == "clang_64" ]]; then
            echo "osx_arch_flag=-DCMAKE_OSX_ARCHITECTURES=x86_64" >> "$GITHUB_OUTPUT"
          else
            echo "osx_arch_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rosetta
        # Needed so macOS can execute the x86_64 binaries produced when cross-compiling for Intel
        if: runner.os == 'macOS' && runner.arch == 'ARM64' && inputs.qt_arch == 'clang_64'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version }}
          arch: ${{ inputs.qt_arch }}
          install-deps: 'true'
          set-env: 'true'

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_C_COMPILER=${{ inputs.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ inputs.cpp_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          ${{ steps.strings.outputs.osx_arch_flag }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config Release
