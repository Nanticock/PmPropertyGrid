name: Shared Build Logic

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      c_compiler:
        required: true
        type: string
      cpp_compiler:
        required: true
        type: string
      qt_version:
        required: true
        type: string
      qt_arch:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Install Rosetta
        # Needed when running on an ARM runner but targeting x86_64 (clang_64) Qt binaries
        if: runner.os == 'macOS' && runner.arch == 'ARM64' && inputs.qt_arch == 'clang_64'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Set arch prefix
        id: arch
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" && "${{ runner.arch }}" == "ARM64" && "${{ inputs.qt_arch }}" == "clang_64" ]]; then
            echo "cmd=arch -x86_64" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version }}
          arch: ${{ inputs.qt_arch }}
          install-deps: 'true'
          set-env: 'true'

      - name: Configure CMake
        run: >
          ${{ steps.arch.outputs.cmd }} cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_C_COMPILER=${{ inputs.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ inputs.cpp_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -S ${{ github.workspace }}

      - name: Build
        run: ${{ steps.arch.outputs.cmd }} cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ${{ steps.arch.outputs.cmd }} ctest --build-config Release
