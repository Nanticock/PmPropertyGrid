name: Shared Build Logic

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      c_compiler:
        required: true
        type: string
      cpp_compiler:
        required: true
        type: string
      qt_version:
        required: true
        type: string
      target_arch:
        required: false
        type: string
        default: ''
      qt_install_script:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Set up target architecture
        if: inputs.target_arch != ''
        shell: bash
        run: echo "CMAKE_ARCH_FLAGS=-DCMAKE_OSX_ARCHITECTURES=${{ inputs.target_arch }}" >> "$GITHUB_ENV"

      - name: Install Qt
        if: inputs.qt_install_script == ''
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version }}
          install-deps: 'true'
          set-env: 'true'

      - name: Install Qt (custom)
        # Runs when qt_install_script is provided. The script is fully responsible for
        # installing Qt and configuring the environment (PATH, QT_ROOT_DIR, Qt_DIR, etc.).
        # QT_VERSION is available as an environment variable with the requested version string.
        if: inputs.qt_install_script != ''
        shell: bash
        env:
          QT_VERSION: ${{ inputs.qt_version }}
        run: ${{ inputs.qt_install_script }}

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_C_COMPILER=${{ inputs.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ inputs.cpp_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          ${{ env.CMAKE_ARCH_FLAGS }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config Release
