name: Shared Build Logic

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      c_compiler:
        required: true
        type: string
      cpp_compiler:
        required: true
        type: string
      qt_version:
        required: true
        type: string
      qt_arch:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Set up target architecture
        # Runs only when qt_arch is specified (macOS matrix entries).
        # clang_64 means the x86_64 Qt variant: cross-compile for Intel and install
        # Rosetta so the resulting x86_64 test binaries execute under emulation.
        # Any other non-empty qt_arch value means a native ARM64 build.
        if: inputs.qt_arch != ''
        shell: bash
        run: |
          if [[ "${{ inputs.qt_arch }}" == "clang_64" ]]; then
            softwareupdate --install-rosetta --agree-to-license
            echo "CMAKE_ARCH_FLAGS=-DCMAKE_OSX_ARCHITECTURES=x86_64" >> "$GITHUB_ENV"
          else
            echo "CMAKE_ARCH_FLAGS=-DCMAKE_OSX_ARCHITECTURES=arm64" >> "$GITHUB_ENV"
          fi

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version }}
          arch: ${{ inputs.qt_arch }}
          install-deps: 'true'
          set-env: 'true'

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_C_COMPILER=${{ inputs.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ inputs.cpp_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          ${{ env.CMAKE_ARCH_FLAGS }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config Release
